name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ✅ Autorisations nécessaires
permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create project structure
      run: |
        mkdir -p app/src/main/{java/com/carmonitor/app,res/values}
        mkdir -p gradle/wrapper
        
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.1.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.0" apply false
        }
        EOF
        
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "CarMonitor"
        include(":app")
        EOF
        
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        EOF
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF
        
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        android {
            namespace = "com.carmonitor.app"
            compileSdk = 34
            defaultConfig {
                applicationId = "com.carmonitor.app"
                minSdk = 21
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            buildTypes {
                debug { isMinifyEnabled = false }
                release { isMinifyEnabled = false }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions { jvmTarget = "17" }
            buildFeatures { compose = true }
            composeOptions { kotlinCompilerExtensionVersion = "1.5.1" }
        }
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.activity:activity-compose:1.8.1")
            implementation(platform("androidx.compose:compose-bom:2023.10.01"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material3:material3")
        }
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/MainActivity.kt << 'EOF'
        package com.carmonitor.app
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.unit.dp
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    MaterialTheme {
                        Surface(modifier = Modifier.fillMaxSize().padding(16.dp)) {
                            Text("🚗 Car Monitor - Build Réussi! ✅", style = MaterialTheme.typography.headlineMedium)
                        }
                    }
                }
            }
        }
        EOF
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Car Monitor" android:theme="@android:style/Theme.Material.Light">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources><string name="app_name">Car Monitor</string></resources>
        EOF
        
        echo "✅ Structure créée"
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
    
    - name: Create Wrapper & Build
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew :app:assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CarMonitor-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
