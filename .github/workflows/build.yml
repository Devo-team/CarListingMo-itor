name: Build Car Monitor - FIXED

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Complete Android Project
      run: |
        mkdir -p app/src/main/java/com/carmonitor/app/{data,ui,worker}
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
        # Gradle files
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        EOF
        
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "CarMonitor"
        include(":app")
        EOF
        
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        android.suppressUnsupportedCompileSdk=34
        EOF
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF
        
        # app/build.gradle.kts
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.carmonitor.app"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.carmonitor.app"
                minSdk = 21
                targetSdk = 34
                versionCode = 2
                versionName = "2.0"
            }
            
            buildFeatures {
                compose = true
            }
            
            composeOptions {
                kotlinCompilerExtensionVersion = "1.5.4"
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            packaging {
                resources.excludes += "/META-INF/{AL2.0,LGPL2.1}"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
            implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.6.2")
            implementation("androidx.activity:activity-compose:1.8.1")
            implementation(platform("androidx.compose:compose-bom:2023.10.01"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material3:material3")
            implementation("androidx.compose.material:material-icons-extended")
            implementation("com.squareup.retrofit2:retrofit:2.9.0")
            implementation("com.squareup.retrofit2:converter-gson:2.9.0")
            implementation("io.coil-kt:coil-compose:2.5.0")
        }
        EOF
        
        # AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:name=".CarMonitorApp"
                android:allowBackup="true"
                android:icon="@android:drawable/ic_dialog_info"
                android:label="@string/app_name"
                android:usesCleartextTraffic="true"
                android:theme="@android:style/Theme.Material.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources>
            <string name="app_name">Car Monitor</string>
        </resources>
        EOF
        
        # Data Models
        cat > app/src/main/java/com/carmonitor/app/data/Models.kt << 'EOF'
        package com.carmonitor.app.data
        
        data class CarListing(
            val id: String,
            val source: String,
            val title: String,
            val price: Double?,
            val currency: String = "TND",
            val location: String,
            val year: Int?,
            val imageUrl: String?,
            val listingUrl: String,
            val publishedDate: String,
            val isNew: Boolean = false
        )
        
        data class ApiResponse<T>(
            val success: Boolean,
            val data: T?,
            val count: Int? = null,
            val error: String? = null
        )
        EOF
        
        # API Service
        cat > app/src/main/java/com/carmonitor/app/data/ApiService.kt << 'EOF'
        package com.carmonitor.app.data
        
        import retrofit2.Retrofit
        import retrofit2.converter.gson.GsonConverterFactory
        import retrofit2.http.GET
        import retrofit2.http.POST
        import retrofit2.http.Query
        
        interface ApiService {
            @GET("api/listings")
            suspend fun getListings(@Query("limit") limit: Int = 50): ApiResponse<List<CarListing>>
            
            @POST("api/scrape")
            suspend fun triggerScrape(): ApiResponse<String>
        }
        
        object RetrofitClient {
            private const val BASE_URL = "https://car-monitor-api.onrender.com/"
            
            val apiService: ApiService by lazy {
                Retrofit.Builder()
                    .baseUrl(BASE_URL)
                    .addConverterFactory(GsonConverterFactory.create())
                    .build()
                    .create(ApiService::class.java)
            }
        }
        EOF
        
        # Repository
        cat > app/src/main/java/com/carmonitor/app/data/Repository.kt << 'EOF'
        package com.carmonitor.app.data
        
        class CarRepository {
            private val api = RetrofitClient.apiService
            
            suspend fun getListings(): Result<List<CarListing>> {
                return try {
                    val response = api.getListings()
                    if (response.success && response.data != null) {
                        Result.success(response.data)
                    } else {
                        Result.failure(Exception(response.error ?: "Error"))
                    }
                } catch (e: Exception) {
                    Result.failure(e)
                }
            }
            
            suspend fun triggerScrape(): Result<String> {
                return try {
                    val response = api.triggerScrape()
                    if (response.success) {
                        Result.success("OK")
                    } else {
                        Result.failure(Exception(response.error ?: "Error"))
                    }
                } catch (e: Exception) {
                    Result.failure(e)
                }
            }
        }
        EOF
        
        # ViewModel
        cat > app/src/main/java/com/carmonitor/app/ui/HomeViewModel.kt << 'EOF'
        package com.carmonitor.app.ui
        
        import androidx.lifecycle.ViewModel
        import androidx.lifecycle.viewModelScope
        import com.carmonitor.app.data.CarListing
        import com.carmonitor.app.data.CarRepository
        import kotlinx.coroutines.flow.MutableStateFlow
        import kotlinx.coroutines.flow.StateFlow
        import kotlinx.coroutines.launch
        
        class HomeViewModel : ViewModel() {
            private val repository = CarRepository()
            private val _uiState = MutableStateFlow(HomeUiState())
            val uiState: StateFlow<HomeUiState> = _uiState
            
            init {
                loadListings()
            }
            
            fun loadListings() {
                viewModelScope.launch {
                    _uiState.value = _uiState.value.copy(isLoading = true, error = null)
                    repository.getListings()
                        .onSuccess { listings ->
                            _uiState.value = _uiState.value.copy(
                                listings = listings,
                                isLoading = false
                            )
                        }
                        .onFailure { error ->
                            _uiState.value = _uiState.value.copy(
                                isLoading = false,
                                error = error.message
                            )
                        }
                }
            }
            
            fun refresh() {
                viewModelScope.launch {
                    _uiState.value = _uiState.value.copy(isRefreshing = true)
                    repository.triggerScrape()
                    kotlinx.coroutines.delay(2000)
                    loadListings()
                    _uiState.value = _uiState.value.copy(isRefreshing = false)
                }
            }
        }
        
        data class HomeUiState(
            val isLoading: Boolean = false,
            val isRefreshing: Boolean = false,
            val listings: List<CarListing> = emptyList(),
            val error: String? = null
        )
        EOF
        
        # UI
        cat > app/src/main/java/com/carmonitor/app/ui/CarMonitorApp.kt << 'EOF'
        package com.carmonitor.app.ui
        
        import android.content.Intent
        import android.net.Uri
        import androidx.compose.foundation.clickable
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.foundation.shape.RoundedCornerShape
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.filled.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.draw.clip
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.layout.ContentScale
        import androidx.compose.ui.platform.LocalContext
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.text.style.TextOverflow
        import androidx.compose.ui.unit.dp
        import androidx.lifecycle.viewmodel.compose.viewModel
        import coil.compose.AsyncImage
        import coil.request.ImageRequest
        import com.carmonitor.app.data.CarListing
        
        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun CarMonitorApp(viewModel: HomeViewModel = viewModel()) {
            val uiState by viewModel.uiState.collectAsState()
            var showSettings by remember { mutableStateOf(false) }
            
            Scaffold(
                topBar = {
                    TopAppBar(
                        title = {
                            Column {
                                Text("🚗 Car Monitor")
                                if (uiState.isRefreshing) {
                                    Text("Actualisation...", style = MaterialTheme.typography.bodySmall)
                                } else {
                                    Text("${uiState.listings.size} annonces", style = MaterialTheme.typography.bodySmall)
                                }
                            }
                        },
                        actions = {
                            IconButton(onClick = { showSettings = true }) {
                                Icon(Icons.Default.Settings, "Paramètres")
                            }
                            IconButton(
                                onClick = { viewModel.refresh() },
                                enabled = !uiState.isRefreshing
                            ) {
                                Icon(Icons.Default.Refresh, "Actualiser")
                            }
                        },
                        colors = TopAppBarDefaults.topAppBarColors(
                            containerColor = MaterialTheme.colorScheme.primaryContainer
                        )
                    )
                }
            ) { padding ->
                Box(modifier = Modifier.padding(padding)) {
                    when {
                        uiState.isLoading && uiState.listings.isEmpty() -> LoadingScreen()
                        uiState.error != null && uiState.listings.isEmpty() -> ErrorScreen(uiState.error!!) { viewModel.loadListings() }
                        else -> ListingsScreen(uiState.listings)
                    }
                    
                    if (uiState.isRefreshing) {
                        LinearProgressIndicator(
                            modifier = Modifier.fillMaxWidth().align(Alignment.TopCenter)
                        )
                    }
                }
                
                if (showSettings) {
                    SettingsDialog { showSettings = false }
                }
            }
        }
        
        @Composable
        fun LoadingScreen() {
            Box(Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                Column(horizontalAlignment = Alignment.CenterHorizontally) {
                    CircularProgressIndicator()
                    Spacer(Modifier.height(16.dp))
                    Text("Chargement des annonces...")
                }
            }
        }
        
        @Composable
        fun ErrorScreen(error: String, onRetry: () -> Unit) {
            Box(Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                Column(horizontalAlignment = Alignment.CenterHorizontally, modifier = Modifier.padding(16.dp)) {
                    Icon(Icons.Default.ErrorOutline, null, Modifier.size(64.dp), tint = MaterialTheme.colorScheme.error)
                    Spacer(Modifier.height(16.dp))
                    Text("Erreur de connexion", style = MaterialTheme.typography.titleLarge)
                    Text(error, style = MaterialTheme.typography.bodyMedium, color = Color.Gray)
                    Spacer(Modifier.height(16.dp))
                    Button(onClick = onRetry) {
                        Text("Réessayer")
                    }
                }
            }
        }
        
        @Composable
        fun ListingsScreen(listings: List<CarListing>) {
            if (listings.isEmpty()) {
                Box(Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                    Column(horizontalAlignment = Alignment.CenterHorizontally) {
                        Icon(Icons.Default.DirectionsCar, null, Modifier.size(64.dp), tint = Color.Gray)
                        Spacer(Modifier.height(16.dp))
                        Text("Aucune annonce", style = MaterialTheme.typography.titleLarge)
                        Text("Appuyez sur actualiser", color = Color.Gray)
                    }
                }
            } else {
                LazyColumn(
                    contentPadding = PaddingValues(16.dp),
                    verticalArrangement = Arrangement.spacedBy(12.dp)
                ) {
                    items(listings, key = { it.id }) { listing ->
                        ListingCard(listing)
                    }
                }
            }
        }
        
        @Composable
        fun ListingCard(listing: CarListing) {
            val context = LocalContext.current
            
            Card(
                modifier = Modifier.fillMaxWidth().clickable {
                    val intent = Intent(Intent.ACTION_VIEW, Uri.parse(listing.listingUrl))
                    context.startActivity(intent)
                },
                elevation = CardDefaults.cardElevation(4.dp)
            ) {
                Row(Modifier.padding(12.dp)) {
                    AsyncImage(
                        model = ImageRequest.Builder(context)
                            .data(listing.imageUrl)
                            .crossfade(true)
                            .placeholder(android.R.drawable.ic_menu_gallery)
                            .error(android.R.drawable.ic_menu_gallery)
                            .build(),
                        contentDescription = listing.title,
                        modifier = Modifier.size(100.dp).clip(RoundedCornerShape(8.dp)),
                        contentScale = ContentScale.Crop
                    )
                    
                    Spacer(Modifier.width(12.dp))
                    
                    Column(Modifier.weight(1f)) {
                        if (listing.isNew) {
                            Surface(color = Color(0xFF4CAF50), shape = RoundedCornerShape(4.dp)) {
                                Text("NOUVEAU", Modifier.padding(horizontal = 6.dp, vertical = 2.dp),
                                    style = MaterialTheme.typography.labelSmall, color = Color.White)
                            }
                            Spacer(Modifier.height(4.dp))
                        }
                        
                        Text(listing.title, style = MaterialTheme.typography.titleMedium,
                            fontWeight = FontWeight.Bold, maxLines = 2, overflow = TextOverflow.Ellipsis)
                        
                        Spacer(Modifier.height(4.dp))
                        
                        Text("${listing.price?.toInt()?.let { "%,d".format(it) } ?: "N/A"} ${listing.currency}",
                            style = MaterialTheme.typography.titleLarge,
                            color = MaterialTheme.colorScheme.primary,
                            fontWeight = FontWeight.Bold)
                        
                        Spacer(Modifier.height(4.dp))
                        
                        Row(verticalAlignment = Alignment.CenterVertically) {
                            Icon(Icons.Default.LocationOn, null, Modifier.size(16.dp), tint = Color.Gray)
                            Spacer(Modifier.width(4.dp))
                            Text(listing.location, style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                            listing.year?.let {
                                Text(" • $it", style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                            }
                        }
                        
                        Text("Source: ${listing.source}", style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                    }
                    
                    Icon(Icons.Default.OpenInNew, "Ouvrir", tint = MaterialTheme.colorScheme.primary)
                }
            }
        }
        
        @Composable
        fun SettingsDialog(onDismiss: () -> Unit) {
            var phone by remember { mutableStateOf("") }
            
            AlertDialog(
                onDismissRequest = onDismiss,
                title = { Text("⚙️ Notifications SMS") },
                text = {
                    Column {
                        Text("Recevez un SMS pour chaque nouvelle annonce")
                        Spacer(Modifier.height(16.dp))
                        OutlinedTextField(
                            value = phone,
                            onValueChange = { phone = it },
                            label = { Text("Numéro (+216)") },
                            modifier = Modifier.fillMaxWidth()
                        )
                        Spacer(Modifier.height(16.dp))
                        Card(colors = CardDefaults.cardColors(containerColor = MaterialTheme.colorScheme.secondaryContainer)) {
                            Column(Modifier.padding(12.dp)) {
                                Text("ℹ️ Déployez le backend sur Render pour activer les SMS",
                                    style = MaterialTheme.typography.bodySmall)
                            }
                        }
                    }
                },
                confirmButton = {
                    Button(onClick = onDismiss) { Text("OK") }
                }
            )
        }
        EOF
        
        # MainActivity
        cat > app/src/main/java/com/carmonitor/app/MainActivity.kt << 'EOF'
        package com.carmonitor.app
        
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.fillMaxSize
        import androidx.compose.material3.MaterialTheme
        import androidx.compose.material3.Surface
        import androidx.compose.ui.Modifier
        import com.carmonitor.app.ui.CarMonitorApp
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    MaterialTheme {
                        Surface(Modifier.fillMaxSize()) {
                            CarMonitorApp()
                        }
                    }
                }
            }
        }
        EOF
        
        # App class
        cat > app/src/main/java/com/carmonitor/app/CarMonitorApp.kt << 'EOF'
        package com.carmonitor.app
        
        import android.app.Application
        
        class CarMonitorApp : Application() {
            override fun onCreate() {
                super.onCreate()
            }
        }
        EOF
        
        cat > app/proguard-rules.pro << 'EOF'
        -keep class com.carmonitor.app.** { *; }
        EOF
        
        echo "✅ Project created!"
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v3
    
    - run: yes | sdkmanager --licenses || true
    
    - uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
    
    - run: gradle wrapper
    - run: chmod +x gradlew
    - run: ./gradlew :app:assembleDebug --stacktrace
    
    - run: cp app/build/outputs/apk/debug/app-debug.apk CarMonitor-v2.0-FINAL.apk
    
    - uses: actions/upload-artifact@v4
      with:
        name: CarMonitor-FINAL
        path: CarMonitor-v2.0-FINAL.apk
