name: Build Debug APK (Installable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Create complete project structure
      run: |
        mkdir -p app/src/main/{java/com/carmonitor/app,res/values}
        mkdir -p gradle/wrapper
        
        # Root build.gradle.kts
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.1.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.0" apply false
        }
        EOF
        
        # settings.gradle.kts
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "CarMonitor"
        include(":app")
        EOF
        
        # gradle.properties
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        EOF
        
        # gradle wrapper properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF
        
        # app/build.gradle.kts (DEBUG BUILD)
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.carmonitor.app"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.carmonitor.app"
                minSdk = 21
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            
            buildTypes {
                debug {
                    isMinifyEnabled = false
                    isDebuggable = true
                }
                release {
                    isMinifyEnabled = false
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            buildFeatures {
                compose = true
            }
            
            composeOptions {
                kotlinCompilerExtensionVersion = "1.5.1"
            }
            
            packaging {
                resources {
                    excludes += "/META-INF/{AL2.0,LGPL2.1}"
                }
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
            implementation("androidx.activity:activity-compose:1.8.1")
            implementation(platform("androidx.compose:compose-bom:2023.10.01"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.ui:ui-graphics")
            implementation("androidx.compose.ui:ui-tooling-preview")
            implementation("androidx.compose.material3:material3")
            implementation("androidx.compose.material:material-icons-extended")
            debugImplementation("androidx.compose.ui:ui-tooling")
        }
        EOF
        
        # MainActivity.kt (Version complète)
        cat > app/src/main/java/com/carmonitor/app/MainActivity.kt << 'EOF'
        package com.carmonitor.app
        
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.filled.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.unit.dp
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    MaterialTheme {
                        CarMonitorApp()
                    }
                }
            }
        }
        
        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun CarMonitorApp() {
            var listings by remember { mutableStateOf(getSampleListings()) }
            
            Scaffold(
                topBar = {
                    TopAppBar(
                        title = { 
                            Column {
                                Text("🚗 Car Monitor")
                                Text(
                                    "${listings.size} annonces disponibles",
                                    style = MaterialTheme.typography.bodySmall
                                )
                            }
                        },
                        colors = TopAppBarDefaults.topAppBarColors(
                            containerColor = MaterialTheme.colorScheme.primaryContainer
                        )
                    )
                }
            ) { padding ->
                LazyColumn(
                    modifier = Modifier
                        .fillMaxSize()
                        .padding(padding),
                    contentPadding = PaddingValues(16.dp),
                    verticalArrangement = Arrangement.spacedBy(12.dp)
                ) {
                    item {
                        Card(
                            colors = CardDefaults.cardColors(
                                containerColor = MaterialTheme.colorScheme.secondaryContainer
                            )
                        ) {
                            Column(modifier = Modifier.padding(16.dp)) {
                                Text(
                                    "✅ Installation Réussie!",
                                    style = MaterialTheme.typography.titleLarge,
                                    fontWeight = FontWeight.Bold
                                )
                                Spacer(modifier = Modifier.height(8.dp))
                                Text("L'application fonctionne correctement.")
                                Text("Version: 1.0 (Debug Build)")
                            }
                        }
                    }
                    
                    items(listings) { listing ->
                        CarListingCard(listing)
                    }
                }
            }
        }
        
        @Composable
        fun CarListingCard(listing: CarListing) {
            Card(
                modifier = Modifier.fillMaxWidth(),
                elevation = CardDefaults.cardElevation(defaultElevation = 4.dp)
            ) {
                Column(modifier = Modifier.padding(16.dp)) {
                    Row(
                        modifier = Modifier.fillMaxWidth(),
                        horizontalArrangement = Arrangement.SpaceBetween,
                        verticalAlignment = Alignment.CenterVertically
                    ) {
                        Icon(
                            Icons.Default.DirectionsCar,
                            contentDescription = null,
                            modifier = Modifier.size(40.dp),
                            tint = MaterialTheme.colorScheme.primary
                        )
                        
                        if (listing.isNew) {
                            Surface(
                                color = Color(0xFF4CAF50),
                                shape = MaterialTheme.shapes.small
                            ) {
                                Text(
                                    "NOUVEAU",
                                    modifier = Modifier.padding(horizontal = 8.dp, vertical = 4.dp),
                                    style = MaterialTheme.typography.labelSmall,
                                    color = Color.White
                                )
                            }
                        }
                    }
                    
                    Spacer(modifier = Modifier.height(8.dp))
                    
                    Text(
                        text = listing.title,
                        style = MaterialTheme.typography.titleMedium,
                        fontWeight = FontWeight.Bold
                    )
                    
                    Spacer(modifier = Modifier.height(4.dp))
                    
                    Text(
                        text = "${listing.price} TND",
                        style = MaterialTheme.typography.titleLarge,
                        color = MaterialTheme.colorScheme.primary,
                        fontWeight = FontWeight.Bold
                    )
                    
                    Spacer(modifier = Modifier.height(8.dp))
                    
                    Row(
                        modifier = Modifier.fillMaxWidth(),
                        horizontalArrangement = Arrangement.SpaceBetween
                    ) {
                        Text(
                            text = "📍 ${listing.location}",
                            style = MaterialTheme.typography.bodyMedium
                        )
                        Text(
                            text = "📅 ${listing.year}",
                            style = MaterialTheme.typography.bodyMedium
                        )
                    }
                    
                    Spacer(modifier = Modifier.height(4.dp))
                    
                    Text(
                        text = "Source: ${listing.source}",
                        style = MaterialTheme.typography.bodySmall,
                        color = Color.Gray
                    )
                }
            }
        }
        
        data class CarListing(
            val title: String,
            val price: String,
            val location: String,
            val year: Int,
            val source: String,
            val isNew: Boolean
        )
        
        fun getSampleListings() = listOf(
            CarListing("Renault Clio 4", "28 000", "Tunis", 2018, "tayara.tn", true),
            CarListing("Peugeot 208", "32 000", "Ariana", 2019, "9annas.tn", true),
            CarListing("Mercedes C200", "85 000", "Sousse", 2017, "tayara.tn", false),
            CarListing("BMW Serie 3", "75 000", "Sfax", 2016, "tunisie-annonce.com", false),
            CarListing("Volkswagen Golf 7", "42 000", "Ben Arous", 2018, "tayara.tn", true),
            CarListing("Toyota Corolla", "38 000", "Nabeul", 2017, "9annas.tn", false),
            CarListing("Hyundai i20", "25 000", "Bizerte", 2016, "tayara.tn", false),
            CarListing("Fiat 500", "22 000", "Monastir", 2015, "9annas.tn", true)
        )
        EOF
        
        # AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            
            <uses-permission android:name="android.permission.INTERNET" />
            
            <application
                android:allowBackup="true"
                android:icon="@android:drawable/ic_dialog_info"
                android:label="@string/app_name"
                android:supportsRtl="true"
                android:theme="@android:style/Theme.Material.Light.NoActionBar">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:theme="@android:style/Theme.Material.Light.NoActionBar">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">Car Monitor</string>
        </resources>
        EOF
        
        # proguard-rules.pro
        cat > app/proguard-rules.pro << 'EOF'
        # Add project specific ProGuard rules here.
        -keep class com.carmonitor.app.** { *; }
        EOF
        
        echo "✅ Project structure created!"
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'
    
    - name: Create Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build DEBUG APK (auto-signed)
      run: ./gradlew :app:assembleDebug --stacktrace
    
    - name: Verify APK exists
      run: |
        echo "=== Searching for APK ==="
        find app/build/outputs/apk -name "*.apk" -type f -exec ls -lh {} \;
    
    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk CarMonitor-v1.0-debug.apk
        ls -lh CarMonitor-v1.0-debug.apk
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: CarMonitor-Debug-APK
        path: CarMonitor-v1.0-debug.apk
        if-no-files-found: error
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Car Monitor v1.0.${{ github.run_number }}
        body: |
          ## 🚗 Car Monitor - Version Debug
          
          ✅ **APK prêt à installer!**
          
          ### Installation:
          1. Télécharger `CarMonitor-v1.0-debug.apk`
          2. Autoriser les sources inconnues dans les paramètres
          3. Installer l'APK
          
          ### Fonctionnalités:
          - ✅ Interface moderne Material Design 3
          - ✅ Affichage de 8 annonces de démonstration
          - ✅ Support Android 5.0+ (API 21+)
          
          **Note:** Ceci est une version DEBUG (développement). L'APK est automatiquement signé pour l'installation.
        files: CarMonitor-v1.0-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
