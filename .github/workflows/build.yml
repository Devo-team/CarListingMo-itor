name: Auto-Setup and Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
    
    - name: Auto-create missing files
      run: |
        # Create settings.gradle.kts if missing
        if [ ! -f "settings.gradle.kts" ]; then
          echo "Creating settings.gradle.kts..."
          cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "CarMonitor"
        include(":app")
        EOF
        fi
        
        # Create build.gradle.kts if missing
        if [ ! -f "build.gradle.kts" ]; then
          echo "Creating build.gradle.kts..."
          cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.1.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.0" apply false
        }
        EOF
        fi
        
        # Create gradle.properties if missing
        if [ ! -f "gradle.properties" ]; then
          echo "Creating gradle.properties..."
          cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        EOF
        fi
        
        # Create gradle wrapper properties
        mkdir -p gradle/wrapper
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        echo "=== Project structure ==="
        ls -la
    
    - name: Install Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle --version
        gradle wrapper
    
    - name: Make gradlew executable
      run: chmod +x gradlew
    
    - name: Build APK
      run: ./gradlew assembleRelease --stacktrace || ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: CarMonitor-APK
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
