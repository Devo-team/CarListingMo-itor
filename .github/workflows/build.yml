name: Build Car Monitor - STANDALONE

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Standalone Android App
      run: |
        mkdir -p app/src/main/java/com/carmonitor/app/{data,ui}
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        
        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        EOF
        
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "CarMonitor"
        include(":app")
        EOF
        
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m
        android.useAndroidX=true
        android.nonTransitiveRClass=true
        android.suppressUnsupportedCompileSdk=34
        EOF
        
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        EOF
        
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        
        android {
            namespace = "com.carmonitor.app"
            compileSdk = 34
            
            defaultConfig {
                applicationId = "com.carmonitor.app"
                minSdk = 21
                targetSdk = 34
                versionCode = 3
                versionName = "3.0"
            }
            
            buildFeatures {
                compose = true
            }
            
            composeOptions {
                kotlinCompilerExtensionVersion = "1.5.4"
            }
            
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = "17"
            }
            
            packaging {
                resources.excludes += "/META-INF/{AL2.0,LGPL2.1}"
            }
        }
        
        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
            implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.6.2")
            implementation("androidx.activity:activity-compose:1.8.1")
            implementation(platform("androidx.compose:compose-bom:2023.10.01"))
            implementation("androidx.compose.ui:ui")
            implementation("androidx.compose.material3:material3")
            implementation("androidx.compose.material:material-icons-extended")
            implementation("io.coil-kt:coil-compose:2.5.0")
        }
        EOF
        
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:allowBackup="true"
                android:icon="@android:drawable/ic_dialog_info"
                android:label="@string/app_name"
                android:theme="@android:style/Theme.Material.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources>
            <string name="app_name">Car Monitor</string>
        </resources>
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/data/Models.kt << 'EOF'
        package com.carmonitor.app.data
        
        import kotlin.random.Random
        
        data class CarListing(
            val id: String,
            val source: String,
            val title: String,
            val price: Double,
            val currency: String = "TND",
            val location: String,
            val year: Int,
            val imageUrl: String?,
            val listingUrl: String,
            val publishedDate: String,
            val isNew: Boolean = false
        )
        
        object FakeDataGenerator {
            private val brands = listOf("Renault", "Peugeot", "Citroën", "Mercedes", "BMW", "Audi", "Volkswagen", "Toyota", "Hyundai", "Kia", "Fiat", "Seat")
            private val models = mapOf(
                "Renault" to listOf("Clio 4", "Megane", "Symbol", "Duster"),
                "Peugeot" to listOf("208", "308", "2008", "3008"),
                "Citroën" to listOf("C3", "C4", "C-Elysée", "Berlingo"),
                "Mercedes" to listOf("C200", "E220", "A180", "GLA"),
                "BMW" to listOf("Serie 3", "Serie 5", "X1", "X3"),
                "Audi" to listOf("A3", "A4", "Q3", "Q5"),
                "Volkswagen" to listOf("Golf 7", "Polo", "Passat", "Tiguan"),
                "Toyota" to listOf("Corolla", "Yaris", "Auris", "RAV4"),
                "Hyundai" to listOf("i20", "i30", "Tucson", "Elantra"),
                "Kia" to listOf("Picanto", "Rio", "Sportage", "Cerato"),
                "Fiat" to listOf("500", "Tipo", "Panda", "Punto"),
                "Seat" to listOf("Ibiza", "Leon", "Arona", "Ateca")
            )
            private val locations = listOf("Tunis", "Ariana", "Ben Arous", "Sfax", "Sousse", "Nabeul", "Bizerte", "Monastir", "Gabès", "Médenine")
            private val sources = listOf("Tayara", "9annas", "Tunisie-Annonce")
            
            fun generateListings(count: Int, newCount: Int = 0): List<CarListing> {
                return (1..count).map { index ->
                    val brand = brands.random()
                    val model = models[brand]?.random() ?: ""
                    val year = (2010..2023).random()
                    val price = when (brand) {
                        "Mercedes", "BMW", "Audi" -> (50000..150000).random().toDouble()
                        "Volkswagen", "Toyota" -> (30000..80000).random().toDouble()
                        else -> (15000..50000).random().toDouble()
                    }
                    
                    CarListing(
                        id = "listing_$index",
                        source = sources.random(),
                        title = "$brand $model $year",
                        price = price,
                        location = locations.random(),
                        year = year,
                        imageUrl = "https://via.placeholder.com/300x200?text=$brand+$model",
                        listingUrl = "https://www.tayara.tn/item/${index}",
                        publishedDate = java.time.LocalDateTime.now().minusHours(Random.nextLong(1, 48)).toString(),
                        isNew = index <= newCount
                    )
                }.sortedByDescending { it.publishedDate }
            }
        }
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/data/Repository.kt << 'EOF'
        package com.carmonitor.app.data
        
        import kotlinx.coroutines.delay
        import kotlin.random.Random
        
        class CarRepository {
            private var cachedListings = FakeDataGenerator.generateListings(20, 3)
            
            suspend fun getListings(): Result<List<CarListing>> {
                delay(500) // Simulate network
                return Result.success(cachedListings)
            }
            
            suspend fun refreshListings(): Result<List<CarListing>> {
                delay(1500) // Simulate scraping
                
                // Générer 2-5 nouvelles annonces
                val newCount = Random.nextInt(2, 6)
                val newListings = FakeDataGenerator.generateListings(newCount, newCount)
                
                // Marquer les anciennes comme non nouvelles
                cachedListings = cachedListings.map { it.copy(isNew = false) }
                
                // Ajouter les nouvelles
                cachedListings = (newListings + cachedListings).take(50)
                
                return Result.success(cachedListings)
            }
        }
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/ui/HomeViewModel.kt << 'EOF'
        package com.carmonitor.app.ui
        
        import androidx.lifecycle.ViewModel
        import androidx.lifecycle.viewModelScope
        import com.carmonitor.app.data.CarListing
        import com.carmonitor.app.data.CarRepository
        import kotlinx.coroutines.flow.MutableStateFlow
        import kotlinx.coroutines.flow.StateFlow
        import kotlinx.coroutines.launch
        
        class HomeViewModel : ViewModel() {
            private val repository = CarRepository()
            private val _uiState = MutableStateFlow(HomeUiState())
            val uiState: StateFlow<HomeUiState> = _uiState
            
            init {
                loadListings()
            }
            
            fun loadListings() {
                viewModelScope.launch {
                    _uiState.value = _uiState.value.copy(isLoading = true, error = null)
                    repository.getListings()
                        .onSuccess { listings ->
                            _uiState.value = _uiState.value.copy(
                                listings = listings,
                                isLoading = false,
                                newCount = listings.count { it.isNew }
                            )
                        }
                        .onFailure { error ->
                            _uiState.value = _uiState.value.copy(
                                isLoading = false,
                                error = error.message
                            )
                        }
                }
            }
            
            fun refresh() {
                viewModelScope.launch {
                    _uiState.value = _uiState.value.copy(isRefreshing = true)
                    repository.refreshListings()
                        .onSuccess { listings ->
                            val newCount = listings.count { it.isNew }
                            _uiState.value = _uiState.value.copy(
                                listings = listings,
                                isRefreshing = false,
                                newCount = newCount,
                                showNewNotification = newCount > 0
                            )
                        }
                        .onFailure {
                            _uiState.value = _uiState.value.copy(isRefreshing = false)
                        }
                }
            }
            
            fun dismissNotification() {
                _uiState.value = _uiState.value.copy(showNewNotification = false)
            }
        }
        
        data class HomeUiState(
            val isLoading: Boolean = false,
            val isRefreshing: Boolean = false,
            val listings: List<CarListing> = emptyList(),
            val newCount: Int = 0,
            val showNewNotification: Boolean = false,
            val error: String? = null
        )
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/ui/CarMonitorApp.kt << 'EOF'
        package com.carmonitor.app.ui
        
        import android.content.Intent
        import android.net.Uri
        import androidx.compose.animation.*
        import androidx.compose.foundation.clickable
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.lazy.LazyColumn
        import androidx.compose.foundation.lazy.items
        import androidx.compose.foundation.shape.RoundedCornerShape
        import androidx.compose.material.icons.Icons
        import androidx.compose.material.icons.filled.*
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.draw.clip
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.layout.ContentScale
        import androidx.compose.ui.platform.LocalContext
        import androidx.compose.ui.text.font.FontWeight
        import androidx.compose.ui.text.style.TextOverflow
        import androidx.compose.ui.unit.dp
        import androidx.lifecycle.viewmodel.compose.viewModel
        import coil.compose.AsyncImage
        import coil.request.ImageRequest
        import com.carmonitor.app.data.CarListing
        
        @OptIn(ExperimentalMaterial3Api::class)
        @Composable
        fun CarMonitorApp(viewModel: HomeViewModel = viewModel()) {
            val uiState by viewModel.uiState.collectAsState()
            var showInfo by remember { mutableStateOf(false) }
            
            Scaffold(
                topBar = {
                    TopAppBar(
                        title = {
                            Column {
                                Text("🚗 Car Monitor")
                                Row(verticalAlignment = Alignment.CenterVertically) {
                                    Text("${uiState.listings.size} annonces", style = MaterialTheme.typography.bodySmall)
                                    if (uiState.newCount > 0) {
                                        Spacer(Modifier.width(8.dp))
                                        Surface(
                                            color = Color(0xFF4CAF50),
                                            shape = RoundedCornerShape(12.dp)
                                        ) {
                                            Text(
                                                "${uiState.newCount} nouvelles",
                                                Modifier.padding(horizontal = 8.dp, vertical = 2.dp),
                                                style = MaterialTheme.typography.labelSmall,
                                                color = Color.White
                                            )
                                        }
                                    }
                                }
                            }
                        },
                        actions = {
                            IconButton(onClick = { showInfo = true }) {
                                Icon(Icons.Default.Info, "Info")
                            }
                            IconButton(
                                onClick = { viewModel.refresh() },
                                enabled = !uiState.isRefreshing
                            ) {
                                Icon(Icons.Default.Refresh, "Actualiser")
                            }
                        },
                        colors = TopAppBarDefaults.topAppBarColors(
                            containerColor = MaterialTheme.colorScheme.primaryContainer
                        )
                    )
                },
                snackbarHost = {
                    AnimatedVisibility(
                        visible = uiState.showNewNotification,
                        enter = slideInVertically() + fadeIn(),
                        exit = slideOutVertically() + fadeOut()
                    ) {
                        Card(
                            modifier = Modifier
                                .fillMaxWidth()
                                .padding(16.dp),
                            colors = CardDefaults.cardColors(
                                containerColor = Color(0xFF4CAF50)
                            )
                        ) {
                            Row(
                                modifier = Modifier.padding(16.dp),
                                verticalAlignment = Alignment.CenterVertically
                            ) {
                                Icon(Icons.Default.Notifications, null, tint = Color.White)
                                Spacer(Modifier.width(12.dp))
                                Text(
                                    "${uiState.newCount} nouvelles annonces trouvées!",
                                    modifier = Modifier.weight(1f),
                                    color = Color.White,
                                    fontWeight = FontWeight.Bold
                                )
                                IconButton(onClick = { viewModel.dismissNotification() }) {
                                    Icon(Icons.Default.Close, null, tint = Color.White)
                                }
                            }
                        }
                    }
                }
            ) { padding ->
                Box(modifier = Modifier.padding(padding)) {
                    when {
                        uiState.isLoading -> LoadingScreen()
                        else -> ListingsScreen(uiState.listings, uiState.isRefreshing)
                    }
                }
                
                if (showInfo) {
                    InfoDialog { showInfo = false }
                }
            }
        }
        
        @Composable
        fun LoadingScreen() {
            Box(Modifier.fillMaxSize(), contentAlignment = Alignment.Center) {
                Column(horizontalAlignment = Alignment.CenterHorizontally) {
                    CircularProgressIndicator()
                    Spacer(Modifier.height(16.dp))
                    Text("Chargement des annonces...")
                }
            }
        }
        
        @Composable
        fun ListingsScreen(listings: List<CarListing>, isRefreshing: Boolean) {
            Box {
                LazyColumn(
                    contentPadding = PaddingValues(16.dp),
                    verticalArrangement = Arrangement.spacedBy(12.dp)
                ) {
                    item {
                        Card(
                            colors = CardDefaults.cardColors(
                                containerColor = MaterialTheme.colorScheme.secondaryContainer
                            )
                        ) {
                            Column(Modifier.padding(16.dp)) {
                                Text(
                                    "📊 Mode Démonstration",
                                    style = MaterialTheme.typography.titleMedium,
                                    fontWeight = FontWeight.Bold
                                )
                                Spacer(Modifier.height(8.dp))
                                Text(
                                    "Cette version fonctionne avec des données simulées.",
                                    style = MaterialTheme.typography.bodyMedium
                                )
                                Text(
                                    "Appuyez sur 🔄 pour simuler de nouvelles annonces!",
                                    style = MaterialTheme.typography.bodySmall,
                                    color = Color.Gray
                                )
                            }
                        }
                    }
                    
                    items(listings, key = { it.id }) { listing ->
                        ListingCard(listing)
                    }
                }
                
                if (isRefreshing) {
                    LinearProgressIndicator(
                        modifier = Modifier.fillMaxWidth().align(Alignment.TopCenter)
                    )
                }
            }
        }
        
        @Composable
        fun ListingCard(listing: CarListing) {
            val context = LocalContext.current
            
            Card(
                modifier = Modifier.fillMaxWidth().clickable {
                    val intent = Intent(Intent.ACTION_VIEW, Uri.parse(listing.listingUrl))
                    context.startActivity(intent)
                },
                elevation = CardDefaults.cardElevation(4.dp)
            ) {
                Row(Modifier.padding(12.dp)) {
                    AsyncImage(
                        model = ImageRequest.Builder(context)
                            .data(listing.imageUrl)
                            .crossfade(true)
                            .build(),
                        contentDescription = listing.title,
                        modifier = Modifier.size(100.dp).clip(RoundedCornerShape(8.dp)),
                        contentScale = ContentScale.Crop
                    )
                    
                    Spacer(Modifier.width(12.dp))
                    
                    Column(Modifier.weight(1f)) {
                        if (listing.isNew) {
                            Surface(color = Color(0xFF4CAF50), shape = RoundedCornerShape(4.dp)) {
                                Text("🆕 NOUVEAU", Modifier.padding(horizontal = 6.dp, vertical = 2.dp),
                                    style = MaterialTheme.typography.labelSmall, color = Color.White)
                            }
                            Spacer(Modifier.height(4.dp))
                        }
                        
                        Text(listing.title, style = MaterialTheme.typography.titleMedium,
                            fontWeight = FontWeight.Bold, maxLines = 2, overflow = TextOverflow.Ellipsis)
                        
                        Spacer(Modifier.height(4.dp))
                        
                        Text("${"%,d".format(listing.price.toInt())} ${listing.currency}",
                            style = MaterialTheme.typography.titleLarge,
                            color = MaterialTheme.colorScheme.primary,
                            fontWeight = FontWeight.Bold)
                        
                        Spacer(Modifier.height(4.dp))
                        
                        Row(verticalAlignment = Alignment.CenterVertically) {
                            Icon(Icons.Default.LocationOn, null, Modifier.size(16.dp), tint = Color.Gray)
                            Spacer(Modifier.width(4.dp))
                            Text(listing.location, style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                            Text(" • ${listing.year}", style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                        }
                        
                        Spacer(Modifier.height(4.dp))
                        
                        Text("📱 Source: ${listing.source}", style = MaterialTheme.typography.bodySmall, color = Color.Gray)
                    }
                    
                    Icon(Icons.Default.OpenInNew, "Ouvrir", tint = MaterialTheme.colorScheme.primary)
                }
            }
        }
        
        @Composable
        fun InfoDialog(onDismiss: () -> Unit) {
            AlertDialog(
                onDismissRequest = onDismiss,
                title = { Text("ℹ️ À propos de Car Monitor") },
                text = {
                    Column {
                        Text(
                            "Version: 3.0 (Démo)",
                            style = MaterialTheme.typography.bodyMedium,
                            fontWeight = FontWeight.Bold
                        )
                        Spacer(Modifier.height(16.dp))
                        
                        Text("✅ Fonctionnalités:", fontWeight = FontWeight.Bold)
                        Text("• Interface complète Material Design 3")
                        Text("• Simulation de nouvelles annonces")
                        Text("• Données réalistes (20+ voitures)")
                        Text("• Badge 'NOUVEAU' sur nouvelles annonces")
                        
                        Spacer(Modifier.height(16.dp))
                        
                        Text("🔜 Prochaines étapes:", fontWeight = FontWeight.Bold)
                        Text("• Connecter au vrai backend")
                        Text("• Scraping des sites réels")
                        Text("• Notifications SMS via Twilio")
                        Text("• Filtres personnalisables")
                        
                        Spacer(Modifier.height(16.dp))
                        
                        Card(
                            colors = CardDefaults.cardColors(
                                containerColor = MaterialTheme.colorScheme.tertiaryContainer
                            )
                        ) {
                            Column(Modifier.padding(12.dp)) {
                                Text(
                                    "💡 Astuce",
                                    fontWeight = FontWeight.Bold,
                                    style = MaterialTheme.typography.bodySmall
                                )
                                Text(
                                    "Appuyez sur le bouton 🔄 pour simuler l'arrivée de nouvelles annonces!",
                                    style = MaterialTheme.typography.bodySmall
                                )
                            }
                        }
                    }
                },
                confirmButton = {
                    Button(onClick = onDismiss) { Text("OK") }
                }
            )
        }
        EOF
        
        cat > app/src/main/java/com/carmonitor/app/MainActivity.kt << 'EOF'
        package com.carmonitor.app
        
        import android.os.Bundle
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.layout.fillMaxSize
        import androidx.compose.material3.MaterialTheme
        import androidx.compose.material3.Surface
        import androidx.compose.ui.Modifier
        import com.carmonitor.app.ui.CarMonitorApp
        
        class MainActivity : ComponentActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContent {
                    MaterialTheme {
                        Surface(Modifier.fillMaxSize()) {
                            CarMonitorApp()
                        }
                    }
                }
            }
        }
        EOF
        
        cat > app/proguard-rules.pro << 'EOF'
        -keep class com.carmonitor.app.** { *; }
        EOF
        
        echo "✅ Standalone app created!"
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - uses: android-actions/setup-android@v4
    - run: yes | sdkmanager --licenses || true
    - uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'
    
    - run: gradle wrapper
    - run: chmod +x gradlew
    - run: ./gradlew :app:assembleDebug --stacktrace
    - run: cp app/build/outputs/apk/debug/app-debug.apk CarMonitor-v3.0-STANDALONE.apk
    
    - uses: actions/upload-artifact@v4
      with:
        name: CarMonitor-Standalone
        path: CarMonitor-v3.0-STANDALONE.apk
